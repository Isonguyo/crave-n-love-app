# Nitro's `netlify` preset emits:
#   - static client assets to `dist/`
#   - an SSR Netlify Function at `.netlify/functions-internal/server.mjs`
#   - a `_redirects` file inside `dist/` that routes unmatched paths to the
#     SSR function, so every TanStack route (/, /menu, /book-service,
#     /checkout, /admin, ...) is server-rendered on first hit and hydrates
#     on the client.
#
# Do NOT add a catch-all `/* -> /` rewrite here — that bypasses SSR and
# returns the static index for every URL, which is what produced the 404s
# / blank pages before.

[build]
  command = "npm run build"
  publish = "dist"
